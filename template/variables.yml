parameters:
- name: SolutionName
  type: string
  default: ''

variables:
#Solution specific variables
- name: SolutionName
  value: ${{ parameters.SolutionName }}
- name: SourceFolder
  value: $(Build.SourcesDirectory)
- name: OutputFolder
  value: $(SourceFolder)\Output

# Common Settings
- name: resourceGroup
  value: VSEng-DDBLDTelemetry
- name: azureSqlServer
  value: vseng-ddbld
- name: ruleName
  value: CollectCloudBuildDataTest
- name: keyVaultName
  value: DLAB2
- name: CertName
  value: OneCert-ddbuild-devdivbuildsystems-cim2

- name: IcMGeneratorName
  value: IcMGenerator

- name: MajorMinor
  value: '1.0'
- name: Patch
  value: $[counter(variables['MajorMinor'], 1)]
- name: PackageVersion
  value: '$(MajorMinor).$(Patch)'