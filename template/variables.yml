parameters:
- name: SolutionName
  type: string
  default: ''

variables:
#Solution specific variables
- name: SolutionName
  value: ${{ parameters.SolutionName }}
- name: SourceFolder
  value: $(Build.SourcesDirectory)
- name: OutputFolder
  value: $(SourceFolder)\${SolutionName}

# Common Settings
- name: resourceGroup
  value: VSEng-DDBLDTelemetry
- name: azureSqlServer
  value: vseng-ddbld
- name: ruleName
  value: CollectCloudBuildDataTest
- name: keyVaultName
  value: DLAB2
- name: CertName
  value: OneCert-ddbuild-devdivbuildsystems-cim2

- name: IcMGeneratorName
  value: IcMGenerator

- name: BuildConfiguration
  value: release
- name: BuildPlatform
  value: any cpu
- name: EngineeringFeedGUID
  value: '6ab25b4b-23f1-44ad-a02c-3a9346d92cc7'