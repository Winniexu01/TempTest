# request-accessToken.yml
# 
# This template requests Azure access tokens for specified Azure subscriptions.
# It iterates through a list of token requests and retrieves the appropriate 
# access token for each one using the Azure CLI.

parameters:
- name: tokens
  type: object
  # Each item should have:
  #   subscription: Azure subscription name
  #   tokenType: accessToken or dbToken

steps:
- ${{ each token in parameters.tokens }}:
  - task: AzureCLI@2
    displayName: 'Get ${{ token.tokenType }} of ${{ token.subscription }}'
    inputs:
      azureSubscription: ${{ token.subscription }}
      scriptType: ps
      scriptLocation: inlineScript
      inlineScript: |
        $subscription = '${{ token.subscription }}'
        $tokenType = '${{ token.tokenType }}'
        
        # Define resource and variable name based on subscription + tokenType combination
        $config = @{
            'VSEng-DDBuildScripts+accessToken' = @{
                Resource = '499b84ac-1321-427f-aa17-267ca6975798'
                VariableName = 'ACCESSTOKEN'
            }
            'VSEng-DDBuildScripts+dbToken' = @{
                Resource = 'https://database.windows.net'
                VariableName = 'DBTOKEN'
            }
            'VSEngMailer+accessToken' = @{
                Resource = 'cfa8b339-82a2-471a-a3c9-0fc0be7a4093'
                VariableName = 'VSEngMailerAuth'
            }
        }
        
        $key = "$subscription+$tokenType"
        if (-not $config.ContainsKey($key)) {
            throw "Unknown subscription+tokenType combination: $key"
        }
        
        $resource = $config[$key].Resource
        $variableName = $config[$key].VariableName
        
        Write-Host "Requesting $tokenType for $subscription..."
        Write-Host "Resource: $resource"
        Write-Host "Variable: $variableName"
        
        $accessToken = az account get-access-token --resource $resource --query "accessToken" --output tsv

        if(-not $accessToken) 
        {
          Write-Error "The $tokenType of $subscription is null or empty!"
        }
        else
        {
          Write-Host "The $tokenType of $subscription is obtained."
        }

        Write-Host "##vso[task.setvariable variable=$variableName]$accessToken"
    continueOnError: false

- task: AzureCLI@2
  displayName: 'Download certificate from Key Vault'
  inputs:
    azureSubscription: VSEng-DDBuildScripts
    scriptType: ps
    scriptLocation: inlineScript
    inlineScript: |
      $icmCert = az keyvault secret show --vault-name "$(keyVaultName)"  --name "$(CertName)" --query value -o tsv

      if(-not $icmCert)
      {
        Write-Error "The certificate of VSEng-DDBuildScripts is null or empty!"
      }
      else
      {
        Write-Host "The certificate of VSEng-DDBuildScripts is obtained."
      }

      Write-Host "##vso[task.setvariable variable=IcMCert]$icmCert"
    continueOnError: false