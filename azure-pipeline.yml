name: $(date:yyyyMMdd)$(rev:.r)

trigger: none
pr: none
pool:
  vmImage: 'windows-latest'
stages:
- stage: stage
  displayName: 'Console App 1'
  jobs:
  - job: Phase_1
    displayName: TempTest
    steps:
    - task: PowerShell@2
      displayName: "Run winget using Windows PowerShell 5.1"
      inputs:
        pwsh: false
        targetType: inline
        script: |
          $PSVersionTable.PSVersion
          where.exe winget
          winget --version
          winget source update --name winget --disable-interactivity
          winget list --id Microsoft.PowerShell --source winget --disable-interactivity
    - task: PowerShell@2
      displayName: Check PowerShell Version (Before Installing PowerShell 7)
      inputs:
        pwsh: true
        targetType: inline
        script: |
          Write-Host "Before installing PowerShell"
          $PSVersionTable.PSVersion
          (Get-Command pwsh).Source
    - task: PowerShell@2
      displayName: Install PowerShell
      inputs:
        pwsh: false
        targetType: inline
        script: |
          try {
            Write-Host "Installing PowerShell 7.5.5.0 via winget (pipeline output suppressed)..."
            winget source update --name winget --disable-interactivity
            & winget install --id Microsoft.PowerShell --version 7.5.5.0 --source winget --silent --disable-interactivity *> $null
          }
          catch {
            Write-Warning "winget command failed: $_"
            $global:LASTEXITCODE = 0
          }
    - task: PowerShell@2
      displayName: Check PowerShell Version (After Installing PowerShell 7)
      inputs:
        pwsh: true
        targetType: inline
        script: |
          Write-Host "After installing PowerShell"
          $PSVersionTable.PSVersion
          (Get-Command pwsh).Source