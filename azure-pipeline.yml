variables:
- template: /azure-pipelines/template/variables.yml@self
  parameters:
    SolutionName: ConsoleApp1

name: $(date:yyyyMMdd)$(rev:.r)

trigger: none
pr: none
pool:
  vmImage: 'windows-latest'
stages:
- stage: stage
  displayName: 'Console App 1'
  jobs:
  - job: Phase_1
    displayName: DDBuildScripts-ConsoleApp1
    steps:
    - template: /azure-pipelines/template/find-msbuild.yml@self

    - template: /azure-pipelines/template/build-solution.yml@self
      parameters:
        SolutionName: '$(SolutionName).sln'

    - task: NuGetCommand@2
      displayName: 'NuGet pack'
      inputs:
        command: 'pack'
        packagesToPack: '**/$(SolutionName).csproj'   # 或 **/*.nuspec
        configuration: 'Release'
        versioningScheme: 'byEnvVar'
        versionEnvVar: 'PackageVersion'
