variables:
- template: /template/variables.yml@self
  parameters:
    SolutionName: ConsoleApp1

name: $(date:yyyyMMdd)$(rev:.r)

trigger: none
pr: none
pool:
  vmImage: 'windows-latest'
stages:
- stage: stage
  displayName: 'Console App 1'
  jobs:
  - job: Phase_1
    displayName: DDBuildScripts-ConsoleApp1
    steps:
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)\Publish' # string. Required. Path to publish. Default: $(Build.ArtifactStagingDirectory).
        ArtifactName: 'Publish' # string. Required. Artifact name. Default: drop.
        publishLocation: Container
      condition: always()